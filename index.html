<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Day Tracker</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f3f4f6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns: repeat(5,1fr);
    gap:10px;
    margin:15px 0;
}

.num{
    padding:15px;
    border-radius:12px;
    border:1px solid #ddd;
    cursor:pointer;
    font-weight:bold;
}

.num.active{
    background:#2563eb;
    color:white;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:12px;
    cursor:pointer;
}

.result{
    margin-top:15px;
    padding:12px;
    border-radius:12px;
    font-weight:bold;
}

.green{
    background:#dcfce7;
    color:#166534;
}

.red{
    background:#fee2e2;
    color:#991b1b;
}

/* POPUP */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:white;
    padding:15px;
    border-radius:15px;
    max-width:350px;
    text-align:center;
}

.popup img{
    width:100%;
    border-radius:10px;
}

.close{
    margin-top:10px;
    padding:8px 15px;
    background:red;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>Fuel Day Tracker</h2>
<p>Select last digit</p>
<p id="viewCount">loading...</p>

<div class="grid" id="numbers"></div>

<button onclick="check()">Check Eligibility</button>
<audio src="./sound.mp3" id="sound" preload="auto" hidden></audio>

    <small style=" text-align: center; margin: 15px;">Developed by <a href="https://github.com/imeshsan2008">DarkVenom</a></small>

</div>
<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <img src="https://tse1.mm.bing.net/th/id/OIP.pWiS8-Mv_4Pg8wrPQ3KN_AHaGG?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Maths Poster">
    <button class="close" onclick="closePopup()">Close</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
const API_BASE = "https://api.counterapi.dev/v2/anti-gravitys-team-3414/first-counter-3414";
const API_KEY = "ut_JjkKp1xwtCFp0qwlQUgsWoX3Gd67chYJSN2fIbCh"; // replace with your actual key

// Increment counter
axios.get(API_BASE + "/up", {
  headers: { Authorization: `Bearer ${API_KEY}` }
})
.then(res => {
  console.log("Updated Count:", res.data.value);
})
.catch(err => console.error("CounterAPI Error:", err));
</script>
<script>
let selected = null;

const container = document.getElementById("numbers");

for(let i=0;i<=9;i++){
    const div = document.createElement("div");
    div.className="num";
    div.innerText=i;

    div.onclick=()=>{
        document.querySelectorAll(".num").forEach(n=>n.classList.remove("active"));
        div.classList.add("active");
        selected=i;
    }

    container.appendChild(div);
}

function check(){
    if(selected === null){
        alert("Select number");
        return;
    }

    const today = new Date();
    const day = today.getDate();

    const isEvenDay = day % 2 === 0;
    const isEvenVehicle = selected % 2 === 0;

    const result = document.getElementById("result");

    // if(isEvenDay === isEvenVehicle){
    //     result.className="result green";
    //     result.innerText="✅ Eligible Today";
    // }else{
    //     result.className="result red";
    //     result.innerText="❌ Not Eligible Today";
    // }

    // show popup
    document.getElementById("popup").style.display="flex";
    document.getElementById("sound").play();
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

// click outside close
window.onclick=function(e){
    if(e.target.id==="popup"){
        closePopup();
    }
}
</script>

</body>
</html>
